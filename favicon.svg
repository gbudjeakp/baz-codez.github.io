<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle (gear body) -->
  <circle cx="50" cy="50" r="35" fill="#f5f0e6" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Gear teeth -->
  <rect x="46" y="10" width="8" height="12" fill="#1a1a1a"/>
  <rect x="46" y="78" width="8" height="12" fill="#1a1a1a"/>
  <rect x="10" y="46" width="12" height="8" fill="#1a1a1a"/>
  <rect x="78" y="46" width="12" height="8" fill="#1a1a1a"/>
  <!-- Diagonal teeth -->
  <rect x="20" y="20" width="8" height="12" fill="#1a1a1a" transform="rotate(45 24 26)"/>
  <rect x="72" y="20" width="8" height="12" fill="#1a1a1a" transform="rotate(-45 76 26)"/>
  <rect x="20" y="68" width="8" height="12" fill="#1a1a1a" transform="rotate(-45 24 74)"/>
  <rect x="72" y="68" width="8" height="12" fill="#1a1a1a" transform="rotate(45 76 74)"/>
  <!-- Cuphead pie-cut eyes -->
  <ellipse cx="38" cy="45" rx="10" ry="12" fill="#1a1a1a"/>
  <ellipse cx="62" cy="45" rx="10" ry="12" fill="#1a1a1a"/>
  <!-- Pie slice highlights -->
  <path d="M 38 33 L 38 45 L 30 45 A 10 12 0 0 1 38 33" fill="#f5f0e6"/>
  <path d="M 62 33 L 62 45 L 54 45 A 10 12 0 0 1 62 33" fill="#f5f0e6"/>
  <!-- Smile -->
  <path d="M 35 58 Q 50 72 65 58" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="26" cy="55" rx="5" ry="3" fill="#d4a574" opacity="0.5"/>
  <ellipse cx="74" cy="55" rx="5" ry="3" fill="#d4a574" opacity="0.5"/>
</svg>
